<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Draft Queue</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="setup-page setup-panel">
    <h1>Draft Queue</h1>
    <p class="subtitle">Create or join a 10-player queue.</p>

    <section class="setup-section">
      <h2>Enter Your Name</h2>

      <input id="playerName" maxlength="20" placeholder="Letters and numbers only" />

      <div class="queue-actions">
        <button id="createQueueBtn">Create Queue</button>

        <div class="join-row">
          <input id="queueCodeInput" maxlength="5" placeholder="Queue code" />
          <button id="joinQueueBtn">Join Queue</button>
        </div>
      </div>

      <p id="errorText" class="error-text"></p>
    </section>

    <details class="optional-box">
      <summary>Old Draft Setup</summary>

      <p class="subtitle">
        This is the old direct draft creator. You can still use it while the queue system is being built.
      </p>

      <section class="setup-section">
        <div class="form-row">
          <input id="blueName" placeholder="Blue team name" />
          <input id="redName" placeholder="Red team name" />
        </div>

        <div class="form-row timer-row">
          <span class="timer-label">Seconds per pick/ban</span>
          <input id="timerSeconds" type="number" value="55" min="5" max="300" />
          <button id="createBtn">Create Draft</button>
        </div>
      </section>

      <div id="links" class="links hidden">
        <h2>Draft Links</h2>

        <label>Blue Team Link</label>
        <input id="blueLink" readonly />
        <button onclick="copyLink('blueLink')">Copy Blue Link</button>

        <label>Red Team Link</label>
        <input id="redLink" readonly />
        <button onclick="copyLink('redLink')">Copy Red Link</button>
      </div>
    </details>
  </main>

  <script src="/socket.io/socket.io.js"></script>
  <script src="setup.js"></script>
</body>
</html>
